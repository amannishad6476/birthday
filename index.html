<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Happy Birthday Aman</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;overflow:hidden;background:linear-gradient(-45deg,#020024,#090979,#6a00ff,#ff1493);background-size:400% 400%;animation:bg 15s ease infinite;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}
@keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
.card{width:min(92vw,700px);padding:2rem;border-radius:24px;background:rgba(255,255,255,.08);backdrop-filter:blur(12px);text-align:center;box-shadow:0 0 40px rgba(255,255,255,.2)}
h1{font-size:clamp(2rem,8vw,5rem);margin:.2em 0}
h2{font-size:clamp(1.3rem,5vw,2.2rem);color:#ffd700}
#count{font-size:clamp(3rem,15vw,6rem);font-weight:bold}
#gift{font-size:5rem;cursor:pointer;display:none}
#cake{display:none;font-size:5rem}
.msg{display:none;font-size:clamp(1.1rem,4vw,1.8rem);margin-top:1rem}
.star{position:fixed;color:#fff;animation:fall linear infinite}
@keyframes fall{from{transform:translateY(-10vh)}to{transform:translateY(110vh)}}
button{padding:.8rem 1.2rem;border:none;border-radius:999px;background:#ff1493;color:#fff;cursor:pointer}
</style>
</head>
<body>
<div class="card">
<div id="count">3</div>
<h1>🎉 HAPPY BIRTHDAY 🎉</h1>
<h2>❤️ Aman Nishad ❤️</h2>
<div id="gift">🎁</div>
<div id="cake">🎂</div>
<div class="msg" id="msg">✨ Wishing You a Lifetime of Happiness! ✨<br>Have an amazing birthday! 💖</div>
</div>
<script>
for(let i=0;i<80;i++){
 let s=document.createElement('div');
 s.className='star';
 s.textContent=Math.random()>.5?'✨':'⭐';
 s.style.left=Math.random()*100+'vw';
 s.style.animationDuration=(4+Math.random()*6)+'s';
 s.style.animationDelay=(Math.random()*6)+'s';
 document.body.appendChild(s);
}
let n=3,c=document.getElementById('count');
let t=setInterval(()=>{
 n--;
 if(n>0){c.textContent=n;}
 else{
 clearInterval(t);
 c.style.display='none';
 gift.style.display='block';
 }
},1000);
gift.onclick=()=>{
 gift.style.display='none';
 cake.style.display='block';
 msg.style.display='block';
}
document.addEventListener('mousemove',e=>{
 let sp=document.createElement('div');
 sp.textContent='✨';
 sp.style.position='fixed';
 sp.style.left=e.clientX+'px';
 sp.style.top=e.clientY+'px';
 sp.style.pointerEvents='none';
 sp.style.transition='1s';
 document.body.appendChild(sp);
 requestAnimationFrame(()=>{sp.style.transform='translateY(-40px)';sp.style.opacity='0';});
 setTimeout(()=>sp.remove(),1000);
});
</script>
</body>
</html>
